<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}" />

  <!-- Fonts: JetBrains Mono (mono) + Instrument Sans (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>

  <header class="site-nav">
    <div class="container nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">{{ site.author.name | downcase | replace: ' ', '_' }}<span>.dev</span></a>
      <nav>
        <a href="#about">about</a>
        <a href="#projects">projects</a>
        <a href="#skills">skills</a>
        <a href="#contact">contact</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>{{ site.author.name }} — embedded systems</span>
      <span>built with jekyll · hosted on github pages</span>
    </div>
  </footer>

</body>
</html>
