---
layout: default
---

<div class="container">
  <article class="post">
    <header class="post-header">
      <div class="section-label">// writeup</div>
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <span>{{ page.date | date: "%Y-%m-%d" }}</span>
        {% if page.tags %}<span class="post-tags">{% for tag in page.tags %}<span class="badge">{{ tag }}</span>{% endfor %}</span>{% endif %}
      </div>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <div class="post-back">
      <a href="{{ '/' | relative_url }}">← back to home</a>
    </div>
  </article>
</div>
